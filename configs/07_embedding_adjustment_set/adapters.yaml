# Дефолты тулкит-адаптеров R&D-7 (эмбеддинги как adjustment set).
# Используются ноутбуком-витриной поверх rnd_reports.embeddings.

columns:
  epk_id: epk_id
  report_dt: report_dt          # месячная гранулярность
  treatment: treatment
  embedding_prefix: emb_         # входные эмбеддинги emb_0_val, emb_1_val, ... (легаси: col_000)
  reduced_prefix: red_           # выход reducer'а red_0, red_1, ...
  propensity_score: prop_score

# Скрипт 1 — снижение размерности (StandardScaler + PCA).
reducer:
  red_size: 5
  seed: 42

# Скрипт 2 — propensity: лучший из LogisticRegression / GBTClassifier по ROC-AUC.
propensity:
  models: [logreg, gbt]
  max_iter: 100
  reg_param: 0.0
  gbt_max_depth: 5
  gbt_max_iter: 20
  val_fraction: 0.3
  seed: 42

# In-time safety: при заданном cutoff адаптеры обучаются только на report_dt <= cutoff.
in_time:
  cutoff: null
